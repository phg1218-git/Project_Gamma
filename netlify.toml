[build]
  command   = "npx prisma migrate deploy && npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Correct MIME types for Next.js static assets ──
[[headers]]
  for = "/_next/static/chunks/*.js"
  [headers.values]
    Content-Type  = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/chunks/app/*.js"
  [headers.values]
    Content-Type  = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/chunks/pages/*.js"
  [headers.values]
    Content-Type  = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*.css"
  [headers.values]
    Content-Type  = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"
