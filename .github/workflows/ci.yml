# ============================================
# 이어줌 (Connecting) — CI Pipeline
# ============================================
# Runs on every PR to main and develop branches.
# Checks: TypeScript, ESLint, Tests, Build verification.

name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  # prisma generate, tsc 모두 실제 DB 연결 없이 작동하지만
  # Next.js 빌드 시 env 가 참조될 수 있으므로 quality job 에도 dummy 값을 설정한다.
  DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
  NEXTAUTH_SECRET: "ci-dummy-secret-not-real"
  NEXTAUTH_URL: "http://localhost:3000"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build
